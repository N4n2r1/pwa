<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Skoob PWA</title>
    <link rel="stylesheet" href="index.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
</head>
<body>

    <div id="auth-screen" class="screen">
        <header><h1>☕ Minha Biblioteca Virtual</h1></header>
        <main>
            <form id="login-form">
                <h2>Entrar ou Criar Conta</h2>
                <input type="email" id="email" placeholder="Seu E-mail" required>
                <input type="password" id="password" placeholder="Sua Senha" required>
                <button type="submit" id="btn-login">Entrar / Cadastrar</button>
            </form>
        </main>
    </div>

    <div id="app-screen" class="screen hidden">
        <header>
            <h1>📚 Minha Estante</h1>
            <button id="btn-logout">Sair</button>
        </header>

        <main>
            <form id="book-form">
                <h2>Adicionar Livro</h2>
                <input type="text" id="title" placeholder="Nome do Livro" required>
                <textarea id="summary" placeholder="Resumo/Notas"></textarea>
                
                <div class="pages-group">
                    <input type="number" id="total-pages" placeholder="Total Páginas" required>
                    <input type="number" id="read-pages" placeholder="Páginas Lidas" required>
                </div>

                <select id="status">
                    <option value="Quero Ler">Quero Ler</option>
                    <option value="Lendo">Lendo</option>
                    <option value="Lido">Lido</option>
                </select>

                <label for="cover">Capa do Livro:</label>
                <input type="file" id="cover" accept="image/*">

                <button type="submit">Salvar Livro</button>
            </form>

            <section class="list-section">
                <h2>Meus Livros Salvos</h2>
                <div id="books-list"></div>
            </section>
        </main>
    </div>

    <script src="index.js"></script>
</body>
</html>
